name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  # Placeholder secrets used by import-time settings validation in tests.
  SUPABASE_URL: https://placeholder.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key-for-ci
  SUPABASE_ANON_KEY: placeholder-anon-key-for-ci
  ANTHROPIC_API_KEY: sk-ant-placeholder-for-ci
  INTEGRATION_ENCRYPTION_KEY: LDIEZqRgBcuL0IBDmiL2EzwyUYjIO3cDNyyJH1qKiFA=

jobs:
  # ============================================
  # FRONTEND PIPELINE
  # ============================================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-typecheck]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
      - name: Check bundle size
        run: |
          echo "## Bundle Analysis" >> $GITHUB_STEP_SUMMARY
          if [ -d ".next" ]; then
            echo "**Total build size:** $(du -sh .next | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run tests
        run: npm test -- --ci --coverage --passWithNoTests
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ============================================
  # BACKEND PIPELINE
  # ============================================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install ruff
      - name: Run Ruff linter
        run: ruff check . --output-format=github --ignore=F401,F541,F841,W293,UP006,UP035,UP045,I001,UP017,UP042,ARG002,SIM102,SIM114,SIM118,SIM210,C401,B905,W291
      - name: Run Ruff formatter check
        # NOTE: formatter check is enforced (was previously continue-on-error).
        run: ruff format --check . || (echo "::warning::Run 'ruff format .' locally to fix"; exit 1)

  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install mypy types-passlib types-python-jose
      - name: Run mypy
        # Soft gate on mypy for now (project not 100% typed), but no longer continue-on-error
        # — failure is surfaced as a warning in the job summary instead of silently ignored.
        run: |
          if ! mypy app --ignore-missing-imports --no-error-summary; then
            echo "::warning::mypy reported issues. Treating as warning until full type coverage lands."
          fi

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install pytest-cov
      - name: Run tests with coverage gate
        # Coverage threshold is enforced. Raise it as the codebase matures.
        # Coverage gate is enforced. Floor reflects current testable surface
        # (tools/schemas/executors are excluded — see pyproject.toml).
        # Ratchet upward as more cases land; never lower it.
        run: PYTHONPATH=. pytest --cov=app --cov-report=term-missing --cov-fail-under=70

  backend-evals:
    name: Backend Agent Evals
    runs-on: ubuntu-latest
    needs: [backend-test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run agent evals
        run: PYTHONPATH=. python -m evals.run

  # ============================================
  # SECURITY SCANNING
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit
      - name: Check Python deps for HIGH/CRITICAL vulns
        # Enforced — was previously continue-on-error. Use --ignore-vuln to
        # waive specific advisories with justification rather than ignoring
        # the entire audit.
        run: |
          cd backend
          pip-audit -r requirements.txt --strict
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check npm deps for HIGH+ vulns
        run: |
          cd frontend
          npm audit --audit-level=high

  # ============================================
  # QUALITY GATE
  # ============================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - frontend-test
      - backend-test
      - backend-evals
      - backend-lint
      - security-scan
    if: always()
    steps:
      - name: Summarize
        run: |
          {
            echo "## Quality Gate Results"
            echo ""
            for job in frontend-build frontend-test backend-test backend-evals backend-lint security-scan; do
              result_var="needs_${job//-/_}_result"
              echo "- ${job}: ${!result_var:-unknown}"
            done
          } >> $GITHUB_STEP_SUMMARY
        env:
          needs_frontend_build_result: ${{ needs.frontend-build.result }}
          needs_frontend_test_result: ${{ needs.frontend-test.result }}
          needs_backend_test_result: ${{ needs.backend-test.result }}
          needs_backend_evals_result: ${{ needs.backend-evals.result }}
          needs_backend_lint_result: ${{ needs.backend-lint.result }}
          needs_security_scan_result: ${{ needs.security-scan.result }}
      - name: Fail if any required job failed
        if: |
          needs.frontend-build.result == 'failure' ||
          needs.frontend-test.result == 'failure' ||
          needs.backend-test.result == 'failure' ||
          needs.backend-evals.result == 'failure' ||
          needs.backend-lint.result == 'failure' ||
          needs.security-scan.result == 'failure'
        run: |
          echo "Quality gate failed"
          exit 1
